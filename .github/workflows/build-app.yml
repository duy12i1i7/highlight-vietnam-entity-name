name: Build desktop app

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag, for example v0.1.0. Leave empty to only build artifacts."
        required: false
        default: ""
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[vi,gui,build,dev]"

      - name: Run tests
        run: pytest

      - name: Build app
        run: python scripts/build_app.py

      - name: Self-test packaged app on Windows
        if: runner.os == 'Windows'
        run: '& "dist/PDF Entity Highlighter/PDF Entity Highlighter.exe" --self-test'

      - name: Self-test packaged app on macOS and Ubuntu
        if: runner.os != 'Windows'
        run: '"dist/PDF Entity Highlighter/PDF Entity Highlighter" --self-test'

      - name: Package Windows build
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/*" -DestinationPath "pdf-entity-highlighter-windows.zip" -Force

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/PDF Entity Highlighter.app" "pdf-entity-highlighter-macos.zip"

      - name: Package Ubuntu build
        if: runner.os == 'Linux'
        run: tar -czf "pdf-entity-highlighter-ubuntu.tar.gz" -C dist "PDF Entity Highlighter"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-entity-highlighter-${{ runner.os }}
          path: |
            pdf-entity-highlighter-*.zip
            pdf-entity-highlighter-*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          fi
          echo "TAG_NAME=${tag}" >> "$GITHUB_ENV"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "PDF Entity Highlighter ${TAG_NAME}" \
              --notes "Desktop builds for Windows, macOS, and Ubuntu."
          fi
